name: Unified Market Scanner

on:
  schedule:
    - cron: "0,30 6-15 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      TV_USERNAME: ${{ secrets.TV_USERNAME }}
      TV_PASSWORD: ${{ secrets.TV_PASSWORD }}
      TV_CHART_ID: ${{ secrets.TV_CHART_ID }}

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          # Önemli: BorsaPy'ın temiz kurulması için cache'i kapattık
          cache: "" 

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # BorsaPy'ı doğrudan git üzerinden zorla kuruyoruz
          python -m pip install git+https://github.com/saidsurucu/borsapy.git --upgrade
          python -m playwright install chromium
          python -m playwright install-deps chromium 

      - name: 🔍 Run Market Scan (tara.py)
        run: |
          echo "🚀 TARA.PY BAŞLIYOR..."
          python tara.py tarama 1H bist || echo "1H hatası"
          python tara.py tarama 4H bist || echo "4H hatası"
          python tara.py tarama 1D bist || echo "1D hatası"
          python tara.py tarama 1W bist || echo "1W hatası"

      - name: 🔍 Run Scanner (scanner.py)
        run: |
          echo "🚀 SCANNER.PY BAŞLIYOR..."
          python scanner.py || echo "scanner.py hatası"

      - name: 💾 Commit updated state.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git status --porcelain | grep -q "state.json"; then
            git add state.json
            git commit -m "Update state [skip ci]"
            git push
          else
            echo "Değişiklik yok."
          fi
